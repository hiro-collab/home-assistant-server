home_assistant:
  base_url: "http://homeassistant.local:8123"
  token_env: "HOME_ASSISTANT_TOKEN"
  timeout_seconds: 8

server:
  api_token_env: "HOME_CONTROL_API_TOKEN"
  log_path: ".cache/home_control/events.jsonl"
  min_api_token_length: 32

udp_events:
  enabled: false
  host: "127.0.0.1"
  port: 7000
  event_type: "home_control_magic"

faults:
  enabled: false
  enabled_env: "HOME_CONTROL_FAULT_MODE"
  rules:
    # Fault injection is ignored unless both faults.enabled is true and HOME_CONTROL_FAULT_MODE=1.
    - match:
        source: "dify"
        action_id: "light_off"
      scenario: "fail_once_then_success"
      message: "simulated transient failure"
    - match:
        source: "dify"
        action_id: "light_on"
        request_id_prefix: "e2e-confirm"
      scenario: "confirmation_required"
      message: "simulated confirmation required"

actions:
  light_on:
    label: "照明をつける"
    ha_script: "script.demo_light_on"
    confirm_required: false
    response_text: "照明をつけました。"
    expected_effect:
      domain: "light"
      service: "turn_on"
      entity_id: "light.demo_room"
      expected_state: "on"

  light_off:
    label: "照明を消す"
    ha_script: "script.demo_light_off"
    confirm_required: false
    response_text: "照明を消しました。"
    expected_effect:
      domain: "light"
      service: "turn_off"
      entity_id: "light.demo_room"
      expected_state: "off"

  curtain_close:
    label: "カーテンを閉める"
    ha_script: "script.curtain_close"
    confirm_required: true
    response_text: "カーテンを閉めました。"

  projection_mode:
    label: "プロジェクションモードにする"
    ha_script: "script.projection_mode"
    confirm_required: true
    response_text: "プロジェクションモードにしました。"
